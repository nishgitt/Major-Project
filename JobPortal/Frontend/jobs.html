<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse and search software development, marketing, and engineering jobs. Filter by Remote work, internships, or salary range.">
    <title>Explore Job Vacancies - CareerZap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <!-- Nav injected by script.js -->
        </div>
    </header>

    <main>
        <!-- Recommendations Section (Shown if Candidate logged in & has matching recommendations) -->
        <div id="job-recommendations-wrapper" class="recommendations-section" style="display: none;">
            <div class="recommendations-title">Recommended Jobs for You</div>
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 1.5rem; margin-top:-0.5rem;">
                Based on your skills profile and years of experience.
            </p>
            <div id="recommended-jobs-grid" class="job-grid">
                <!-- Dynamically populated by script.js -->
            </div>
        </div>

        <div class="section-title">
            <h2>Explore Active <span>Job Openings</span></h2>
        </div>

        <div class="page-layout">
            <!-- Filter Sidebar -->
            <aside class="filter-sidebar">
                <h3>Search Filters</h3>
                
                <div class="filter-section">
                    <label for="job-keyword">Keyword Search</label>
                    <input type="text" id="job-keyword" placeholder="Title, company, skill...">
                </div>

                <div class="filter-section">
                    <label for="job-location">Location</label>
                    <input type="text" id="job-location" placeholder="City or 'Remote'...">
                </div>

                <div class="filter-section">
                    <label for="job-type-filter">Job Classification</label>
                    <select id="job-type-filter">
                        <option value="all">All Types</option>
                        <option value="Full Time">Full Time</option>
                        <option value="Part Time">Part Time</option>
                        <option value="Internship">Internship</option>
                        <option value="Remote">Remote</option>
                    </select>
                </div>

                <div class="filter-section">
                    <label for="job-salary-filter">Minimum Salary (Annual)</label>
                    <select id="job-salary-filter">
                        <option value="0">Any Salary</option>
                        <option value="300000">₹3,00,000+</option>
                        <option value="500000">₹5,0,0000+</option>
                        <option value="800000">₹8,00,000+</option>
                        <option value="1200000">₹12,00,000+</option>
                        <option value="1500000">₹15,00,000+</option>
                    </select>
                </div>
            </aside>

            <!-- Main Job Listing Grid -->
            <section style="flex: 1;">
                <div id="jobs-list-grid" class="job-grid">
                    <!-- Dynamically populated by script.js -->
                </div>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CareerZap Job Portal. Developed with Django REST APIs & SQLite. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
