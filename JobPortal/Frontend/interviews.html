<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="View upcoming job interviews, check scheduled dates and slots, choose online/offline modes, and track calendars.">
    <title>Manage Interviews - CareerZap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <!-- Nav injected by script.js -->
        </div>
    </header>

    <main>
        <div class="section-title">
            <h2>Your <span>Interview Schedules</span></h2>
        </div>

        <div style="display: grid; grid-template-columns: 420px 1fr; gap: 2rem; align-items: start;">
            <!-- Left panel: list of interviews -->
            <section class="dashboard-section" style="padding: 1.8rem;">
                <h3 style="font-size: 1.25rem; margin-bottom: 1.25rem;">Upcoming Bookings</h3>
                <div id="interviews-list-container">
                    <!-- Dynamically populated by script.js -->
                </div>
            </section>

            <!-- Right panel: Calendar -->
            <section class="dashboard-section" style="padding: 1.8rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h3 style="font-size: 1.25rem; margin-bottom: 0;" id="calendar-month-title">Interview Calendar</h3>
                    <div style="display: flex; gap: 0.5rem; font-size: 0.75rem;">
                        <span style="display: inline-flex; align-items: center; gap: 0.3rem;"><span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--accent-violet);"></span> Online</span>
                        <span style="display: inline-flex; align-items: center; gap: 0.3rem;"><span style="display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--color-warning);"></span> Offline</span>
                    </div>
                </div>
                
                <div class="calendar-header">
                    <div>Sun</div>
                    <div>Mon</div>
                    <div>Tue</div>
                    <div>Wed</div>
                    <div>Thu</div>
                    <div>Fri</div>
                    <div>Sat</div>
                </div>
                
                <div id="interview-calendar-grid" class="calendar-grid">
                    <!-- Calendar days rendered by script.js -->
                </div>
            </section>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CareerZap Job Portal. Developed with Django REST APIs & SQLite. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
