<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin control panel to manage candidates, employers, jobs, applications, and scheduled interviews.">
    <title>Administrator Panel - CareerZap</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <!-- Nav injected by script.js -->
        </div>
    </header>

    <main>
        <div class="section-title" style="margin-bottom: 1.5rem;">
            <h2>Admin <span>Control Workspace</span></h2>
        </div>

        <!-- Management Tabs -->
        <div class="admin-tab-group">
            <button class="admin-tab-btn active" data-table="candidates">Candidates</button>
            <button class="admin-tab-btn" data-table="employers">Employers</button>
            <button class="admin-tab-btn" data-table="jobs">Jobs</button>
            <button class="admin-tab-btn" data-table="applications">Applications</button>
            <button class="admin-tab-btn" data-table="interviews">Interviews</button>
        </div>

        <!-- Main CRUD Grid Panel -->
        <div class="dashboard-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h3 id="admin-list-title" style="margin-bottom: 0;">Manage Candidates</h3>
                <button class="btn btn-primary" id="admin-add-new-btn" onclick="openAdminAddModal('candidates')">⚡ Add New</button>
            </div>
            
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr id="admin-table-header">
                            <!-- Injected by script.js -->
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                        <!-- Injected by script.js -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CareerZap Job Portal. Developed with Django REST APIs & SQLite. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
