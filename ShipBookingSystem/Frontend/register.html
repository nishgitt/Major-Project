<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passenger Registration - OceanWave</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <!-- Dynamic Header Navigation Bar -->
    <nav class="navbar" id="navbar-container"></nav>

    <!-- Glassmorphic Register Form Card -->
    <main class="form-page-container" style="padding: 3rem 5%;">
        <div class="glass-form" style="max-width: 550px;">
            <h1 class="form-title-h1">Passenger Registration</h1>
            <p class="form-subtitle-p">Create a profile to book cruise cabins and voyages instantly</p>
            
            <form id="register-form">
                <div class="field-group">
                    <label for="fullname" class="field-label">Full Name</label>
                    <input type="text" id="fullname" class="field-control" placeholder="Rahul Sharma" required>
                </div>
                
                <div class="field-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0;">
                    <div class="field-group">
                        <label for="email" class="field-label">Email Address</label>
                        <input type="email" id="email" class="field-control" placeholder="rahul@gmail.com" required autocomplete="email">
                    </div>
                    <div class="field-group">
                        <label for="phone" class="field-label">Phone Number</label>
                        <input type="tel" id="phone" class="field-control" placeholder="9876543210" required>
                    </div>
                </div>
                
                <div class="field-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0;">
                    <div class="field-group">
                        <label for="nationality" class="field-label">Nationality</label>
                        <input type="text" id="nationality" class="field-control" placeholder="Indian" required>
                    </div>
                    <div class="field-group">
                        <label for="passport" class="field-label">Passport Number</label>
                        <input type="text" id="passport" class="field-control" placeholder="N1234567" required>
                    </div>
                </div>
                
                <div class="field-group">
                    <label for="password" class="field-label">Password</label>
                    <input type="password" id="password" class="field-control" placeholder="••••••••" required autocomplete="new-password">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register Profile</button>
            </form>
            
            <div class="form-footer" style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-secondary);">
                <p>Already have an account? <a href="login.html" style="color: var(--color-secondary); text-decoration: none;">Sign In</a></p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer style="text-align: center; padding: 2rem 0; color: var(--text-muted); font-size: 0.85rem;">
        <p>&copy; 2026 OceanWave Inc.</p>
    </footer>

</body>
</html>
