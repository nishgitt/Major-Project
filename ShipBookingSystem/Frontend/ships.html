<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyages Directory - OceanWave</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <!-- Dynamic Header Navigation Bar -->
    <nav class="navbar" id="navbar-container"></nav>

    <!-- Voyage Search and Filters header -->
    <main style="padding-top: 3rem;">
        <h1 style="text-align: center; margin-bottom: 2rem; font-family: var(--font-heading); font-size: 2.8rem;">Browse Ship Voyages</h1>
        
        <section class="search-filter-section">
            <div class="search-filter-container">
                <!-- Departure Port -->
                <div class="search-input-group">
                    <input type="text" id="search-source" placeholder="Search Departure Port (e.g. Chennai Port)">
                </div>
                <!-- Destination Port -->
                <div class="search-input-group">
                    <input type="text" id="search-dest" placeholder="Search Destination Port (e.g. Port Blair)">
                </div>
                <!-- Date Filter -->
                <div class="filter-group">
                    <input type="date" id="search-date" class="filter-select" placeholder="Select Date">
                </div>
            </div>
        </section>

        <!-- Voyages Listings Grid -->
        <section>
            <div class="ship-grid" id="ships-grid">
                <!-- Dynamic cards populated here -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer style="text-align: center; padding: 3rem 0; border-top: 1px solid rgba(255,255,255,0.05); color: var(--text-secondary); margin-top: 4rem;">
        <p>&copy; 2026 OceanWave Inc.</p>
    </footer>

</body>
</html>
