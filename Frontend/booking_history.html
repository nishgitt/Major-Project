<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking History - Eventify</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <!-- Dynamic Header Navigation Bar -->
    <nav class="navbar" id="navbar-container"></nav>

    <main style="padding: 3rem 5%;">
        <h1 style="font-family: var(--font-heading); font-size: 2.5rem; margin-bottom: 2rem; text-align: center;">My Ticket Bookings</h1>
        
        <div style="max-width: 800px; margin: 0 auto;">
            
            <!-- Section: Upcoming Bookings -->
            <section style="margin-bottom: 3rem;">
                <h2 style="font-family: var(--font-heading); font-size: 1.8rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-glow); padding-bottom: 0.5rem; color: var(--color-secondary);">Upcoming Events</h2>
                <div id="upcoming-bookings">
                    <p style="text-align: center; color: var(--text-secondary);">Loading upcoming bookings...</p>
                </div>
            </section>
            
            <!-- Section: Past Bookings -->
            <section>
                <h2 style="font-family: var(--font-heading); font-size: 1.8rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-glow); padding-bottom: 0.5rem; color: var(--text-muted);">Past Events</h2>
                <div id="past-bookings">
                    <p style="text-align: center; color: var(--text-secondary);">Loading past bookings...</p>
                </div>
            </section>
            
        </div>
    </main>

    <!-- Footer -->
    <footer style="text-align: center; padding: 3rem 0; border-top: 1px solid rgba(255,255,255,0.05); color: var(--text-secondary); margin-top: 4rem;">
        <p>&copy; 2026 Eventify Inc.</p>
    </footer>

</body>
</html>
