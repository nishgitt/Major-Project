<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track asset allocations and schedule maintenance/warranty jobs.">
    <title>Allocations & Maintenance - EduAsset</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <!-- Injected by script.js -->
        </div>
    </header>

    <main>
        <div class="section-title">
            <h2>Allocations & <span>Maintenance</span></h2>
            <button id="btn-add-allocation" class="btn btn-primary">+ Allocate Asset</button>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Asset Name</th>
                        <th>Department</th>
                        <th>Assigned Date</th>
                        <th>Maintenance Date</th>
                        <th>Maintenance Status</th>
                        <th>Remarks</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="allocations-table-body">
                    <!-- Loaded dynamically by script.js -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Form -->
    <div id="allocation-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Allocate Asset</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="allocation-form">
                <input type="hidden" id="edit-alloc-id">
                
                <div class="form-group">
                    <label for="alloc_asset">Select Asset *</label>
                    <select id="alloc_asset" class="form-control" required>
                        <!-- Loaded dynamically -->
                    </select>
                </div>

                <div class="form-group">
                    <label for="alloc_dept">Select Department *</label>
                    <select id="alloc_dept" class="form-control" required>
                        <!-- Loaded dynamically -->
                    </select>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="alloc_assigned_date">Assigned Date *</label>
                        <input type="date" id="alloc_assigned_date" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="alloc_maintenance_date">Maintenance Date *</label>
                        <input type="date" id="alloc_maintenance_date" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="alloc_status">Maintenance Status *</label>
                    <select id="alloc_status" class="form-control" required>
                        <option value="Pending">Pending</option>
                        <option value="Completed">Completed</option>
                        <option value="Warranty Claim">Warranty Claim</option>
                        <option value="Under Repair">Under Repair</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="alloc_remarks">Remarks / Warranty Details</label>
                    <textarea id="alloc_remarks" class="form-control" rows="3" placeholder="Condition reports, repair details or remarks"></textarea>
                </div>

                <div class="form-group">
                    <label for="alloc_document">Upload Maintenance Report / Receipt</label>
                    <input type="file" id="alloc_document" class="form-control" accept="image/*,application/pdf">
                    <div id="current-alloc-doc-link" style="display:none; font-size:0.85rem; margin-top:0.5rem; color:var(--accent-blue);"></div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 <span>EduAsset</span>. College Asset Management System. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
