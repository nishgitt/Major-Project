<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage college departments where assets are allocated.">
    <title>Department Management - EduAsset</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <!-- Injected by script.js -->
        </div>
    </header>

    <main>
        <div class="section-title">
            <h2>Department <span>Management</span></h2>
            <button id="btn-add-dept" class="btn btn-primary">+ Add New Department</button>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Department Name</th>
                        <th>HOD Name</th>
                        <th>Location</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="departments-table-body">
                    <!-- Loaded dynamically by script.js -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Form -->
    <div id="department-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add Department</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="department-form">
                <input type="hidden" id="edit-dept-id">
                
                <div class="form-group">
                    <label for="dept_name">Department Name *</label>
                    <input type="text" id="dept_name" class="form-control" required placeholder="e.g. Computer Science & Engineering">
                </div>

                <div class="form-group">
                    <label for="dept_hod">HOD Name</label>
                    <input type="text" id="dept_hod" class="form-control" placeholder="e.g. Dr. Ramesh Kumar">
                </div>

                <div class="form-group">
                    <label for="dept_location">Location / Block</label>
                    <input type="text" id="dept_location" class="form-control" placeholder="e.g. Block-A, 3rd Floor">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 <span>EduAsset</span>. College Asset Management System. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
