<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure administrative login for EduAsset College Asset Management System.">
    <title>Admin Login - EduAsset</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <!-- Injected by script.js -->
        </div>
    </header>

    <main>
        <div class="glass-card login-container">
            <h2 style="font-family: var(--font-outfit); font-size: 1.75rem; text-align: center; margin-bottom: 0.5rem;">Admin <span>Sign In</span></h2>
            <p style="color: var(--text-secondary); text-align: center; font-size: 0.88rem; margin-bottom: 2rem;">Authorized administrator panel access only.</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter admin username" required autocomplete="username">
                </div>
                
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
            </form>

            <div style="margin-top: 1.5rem; padding: 0.75rem; background: rgba(245, 158, 11, 0.05); border: 1px dashed rgba(245, 158, 11, 0.2); border-radius: 6px; font-size: 0.8rem; text-align: center; color: var(--color-warning);">
                <strong>Demo Credentials:</strong> admin / admin123
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 <span>EduAsset</span>. College Asset Management System. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
