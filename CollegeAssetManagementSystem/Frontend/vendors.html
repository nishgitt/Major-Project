<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Manage vendor details from whom assets are purchased.">
    <title>Vendor Management - EduAsset</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <!-- Injected by script.js -->
        </div>
    </header>

    <main>
        <div class="section-title">
            <h2>Vendor <span>Management</span></h2>
            <button id="btn-add-vendor" class="btn btn-primary">+ Add New Vendor</button>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Vendor Name</th>
                        <th>Contact Person</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Address</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="vendors-table-body">
                    <!-- Loaded dynamically by script.js -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- Modal Form -->
    <div id="vendor-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Add Vendor</h3>
                <button class="modal-close">&times;</button>
            </div>
            <form id="vendor-form">
                <input type="hidden" id="edit-vendor-id">
                
                <div class="form-group">
                    <label for="vendor_name">Vendor Name *</label>
                    <input type="text" id="vendor_name" class="form-control" required placeholder="e.g. Dell Enterprise Solutions">
                </div>

                <div class="form-group">
                    <label for="vendor_contact">Contact Person</label>
                    <input type="text" id="vendor_contact" class="form-control" placeholder="e.g. Amit Patel">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="vendor_phone">Phone</label>
                        <input type="text" id="vendor_phone" class="form-control" placeholder="e.g. 9876543210">
                    </div>
                    <div class="form-group">
                        <label for="vendor_email">Email</label>
                        <input type="email" id="vendor_email" class="form-control" placeholder="e.g. sales@dell.in">
                    </div>
                </div>

                <div class="form-group">
                    <label for="vendor_address">Address</label>
                    <textarea id="vendor_address" class="form-control" rows="3" placeholder="Vendor office location address"></textarea>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 <span>EduAsset</span>. College Asset Management System. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
