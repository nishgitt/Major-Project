<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a new student profile on Examly to begin taking exams.">
    <title>Student Registration | Examly</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <span>🎓 Examly</span>
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="exams.html">Exams</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="form-container" style="max-width: 500px;" id="registerCard">
            <div class="form-header">
                <h2>Create Account</h2>
                <p>Register as a student to start your exams</p>
            </div>

            <form id="registerForm" onsubmit="handleRegisterSubmit(event)">
                <div class="form-group">
                    <label for="regFullName">Full Name</label>
                    <input type="text" id="regFullName" placeholder="e.g. Rahul Sharma" required>
                </div>

                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" placeholder="e.g. rahul@gmail.com" required>
                </div>

                <div class="form-group">
                    <label for="regPhone">Phone Number</label>
                    <input type="tel" id="regPhone" placeholder="e.g. 9876543210" required>
                </div>

                <div class="form-group">
                    <label for="regCollege">College / Institution</label>
                    <input type="text" id="regCollege" placeholder="e.g. ABC Engineering College" required>
                </div>

                <div class="form-group">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label for="regConfirmPassword">Confirm Password</label>
                    <input type="password" id="regConfirmPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary" id="btnRegisterSubmit">Create Account</button>
            </form>

            <div class="form-footer">
                Already have an account? <a href="login.html">Sign In</a>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Examly Online Examination Portal. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
