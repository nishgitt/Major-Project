<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses Catalog - AetherAcademy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <header class="elearning-header">
        <nav class="navbar elearning-navbar">
            <div id="auth-buttons" class="nav-left-actions">
                <a href="register.html" class="nav-signup-link">
                    <svg class="nav-signup-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span>Sign up</span>
                </a>
            </div>
            <ul class="nav-links elearning-nav-links">
                <li><a href="index.html">Home</a></li>
                <li class="dropdown-item">
                    <a href="courses.html" class="active">E-books <span class="chevron-down">▼</span></a>
                </li>
                <li><a href="index.html#about-section">About Us</a></li>
                <li><a href="index.html#footer-section">Contact</a></li>
                <li><a href="dashboard.html" class="student-only">Dashboard</a></li>
            </ul>
            <div class="nav-search-container">
                <div class="nav-search-box">
                    <input type="text" id="nav-search-input" placeholder="Search courses..." onkeydown="if(event.key === 'Enter') triggerSearch()">
                    <button class="nav-search-btn" onclick="triggerSearch()">Search</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <h2 class="section-title">Explore Courses</h2>
        
        <!-- Filter Bar -->
        <div class="glass-container courses-filter-bar" style="padding: 1.5rem;">
            <input type="text" id="course-search" class="form-control search-input" placeholder="Search by course name or category...">
            <select id="course-level-filter" class="form-control filter-select">
                <option value="all">All Difficulty Levels</option>
                <option value="Beginner">Beginner</option>
                <option value="Intermediate">Intermediate</option>
                <option value="Advanced">Advanced</option>
            </select>
            <select id="course-price-filter" class="form-control filter-select">
                <option value="all">All Prices</option>
                <option value="free">Free Courses</option>
                <option value="paid">Paid Courses</option>
            </select>
        </div>

        <div class="courses-grid" id="courses-catalog-grid">
            <!-- Rendered dynamically by script.js -->
        </div>
    </main>

    <!-- Enrollment Success Notification Modal -->
    <div class="modal" id="enrollment-modal">
        <div class="glass-container modal-content" style="text-align: center;">
            <button class="modal-close" onclick="closeEnrollmentModal()">&times;</button>
            <h3 style="font-size: 1.8rem; color: var(--success); margin-bottom: 1rem;">Enrollment Successful!</h3>
            <p style="color: var(--text-muted); margin-bottom: 2rem;" id="enrollment-modal-text">You have successfully registered for the course.</p>
            <div style="display:flex; justify-content:center; gap: 1.5rem;">
                <a href="enrollments.html" class="btn-primary">View My Enrollments</a>
                <button class="btn-secondary" onclick="closeEnrollmentModal()">Keep Browsing</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
