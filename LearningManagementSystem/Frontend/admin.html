<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor Portal - AetherAcademy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <header>
        <nav class="navbar">
            <a href="index.html" class="logo">
                <div class="logo-icon-box">
                    <svg class="logo-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c0 2 2.5 3 6 3s6-1 6-3v-5"/></svg>
                </div>
                <div class="logo-text">
                    <span class="logo-main">EduLearn</span>
                    <span class="logo-sub">LMS</span>
                </div>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="admin.html" class="active admin-only">Instructors</a></li>
                <li><a href="index.html#about-section">About Us</a></li>
                <li><a href="index.html#footer-section">Contact</a></li>
                <li><a href="dashboard.html" class="student-only">Dashboard</a></li>
            </ul>
            <div id="auth-buttons" class="nav-actions">
                <a href="login.html" class="btn-secondary" id="nav-login-btn">Login</a>
                <a href="register.html" class="btn-primary" id="nav-register-btn">Register</a>
            </div>
        </nav>
    </header>

    <main class="container" style="max-width: 1400px;">
        <h2 class="section-title">Instructor Administration</h2>

        <div id="admin-unauthorized" class="glass-container" style="display:none; padding:3rem; text-align:center; max-width:600px; margin: 4rem auto;">
            <h3>Access Denied</h3>
            <p style="color:var(--text-muted); margin: 1rem 0 2rem;">You must be logged in as an instructor to access the administrative CRUD panel.</p>
            <a href="login.html" class="btn-primary">Instructor Login</a>
        </div>

        <div class="admin-layout" id="admin-content" style="display:none;">
            <!-- Sidebar Navigation -->
            <div class="glass-container admin-sidebar">
                <h3 style="font-size:1.1rem; margin-bottom:1rem; color:var(--text-muted); padding-left:0.5rem; text-transform:uppercase;">Entities</h3>
                <button class="admin-tab-btn active" onclick="switchAdminTab('students')">Students</button>
                <button class="admin-tab-btn" onclick="switchAdminTab('instructors')">Instructors</button>
                <button class="admin-tab-btn" onclick="switchAdminTab('courses')">Courses</button>
                <button class="admin-tab-btn" onclick="switchAdminTab('enrollments')">Enrollments</button>
                <button class="admin-tab-btn" onclick="switchAdminTab('assignments')">Assignments</button>
                <div style="margin-top:auto; padding-top:2rem;">
                    <button onclick="logout()" class="btn-secondary" style="width:100%; padding:0.5rem 1rem; font-size:0.9rem;">Sign Out</button>
                </div>
            </div>

            <!-- Main Content Panel -->
            <div class="glass-container admin-main">
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem;">
                    <h3 style="font-size:1.6rem;" id="admin-panel-title">Manage Students</h3>
                    <button class="btn-primary" id="admin-add-new-btn" onclick="openCrudModal('add')">+ Add New</button>
                </div>

                <!-- Live Grids -->
                <div class="admin-table-container">
                    <table id="admin-data-table">
                        <!-- Head and body will be filled dynamically based on selected tab -->
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- CRUD Form Dialog Modal -->
    <div class="modal" id="crud-modal">
        <div class="glass-container modal-content">
            <button class="modal-close" onclick="closeCrudModal()">&times;</button>
            <h3 style="font-size:1.8rem; margin-bottom:2rem; text-align:center;" id="crud-modal-title">Add Entry</h3>
            
            <form id="crud-form">
                <!-- Inner form elements injected programmatically in script.js depending on active entity tab -->
                <div id="crud-form-fields"></div>
                
                <div style="margin-top: 1.5rem; display:flex; justify-content:flex-end; gap: 1.5rem;">
                    <button type="button" class="btn-secondary" onclick="closeCrudModal()">Cancel</button>
                    <button type="submit" class="btn-primary" id="crud-submit-btn">Save Entry</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
