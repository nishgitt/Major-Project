<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - AetherAcademy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <header class="elearning-header">
        <nav class="navbar elearning-navbar">
            <div id="auth-buttons" class="nav-left-actions">
                <a href="register.html" class="nav-signup-link">
                    <svg class="nav-signup-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span>Sign up</span>
                </a>
            </div>
            <ul class="nav-links elearning-nav-links">
                <li><a href="index.html">Home</a></li>
                <li class="dropdown-item">
                    <a href="courses.html">E-books <span class="chevron-down">▼</span></a>
                </li>
                <li><a href="index.html#about-section">About Us</a></li>
                <li><a href="index.html#footer-section">Contact</a></li>
                <li><a href="dashboard.html" class="student-only">Dashboard</a></li>
            </ul>
            <div class="nav-search-container">
                <div class="nav-search-box">
                    <input type="text" id="nav-search-input" placeholder="Search courses..." onkeydown="if(event.key === 'Enter') triggerSearch()">
                    <button class="nav-search-btn" onclick="triggerSearch()">Search</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="glass-container form-container" id="register-section">
            <h2 class="form-title">Student Registration</h2>
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" class="form-control" placeholder="Rahul Sharma" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="rahul@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="reg-phone">Phone Number</label>
                    <input type="tel" id="reg-phone" class="form-control" placeholder="9876543210" required>
                </div>
                <div class="form-group">
                    <label for="reg-qualification">Academic Qualification</label>
                    <input type="text" id="reg-qualification" class="form-control" placeholder="B.Tech / MCA" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="minimum 6 characters" required>
                </div>
                <div style="margin-top: 1rem; color: var(--danger); font-size: 0.9rem;" id="reg-error-msg"></div>
                <button type="submit" class="btn-primary form-submit-btn" id="reg-submit-btn">Register Profile</button>
            </form>
            <div class="form-redirect">
                <p>Already registered? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
