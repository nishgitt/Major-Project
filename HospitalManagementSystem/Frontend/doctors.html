<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Care - Doctors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">
                <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 10.5V20a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-9.5M12 4v16m-8-8h16"></path>
                </svg>
                <span>HOSPITAL CARE</span>
            </a>
            <nav>
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="patients.html" class="nav-link">Patients</a></li>
                    <li><a href="doctors.html" class="nav-link active">Doctors</a></li>
                    <li><a href="appointments.html" class="nav-link">Appointments</a></li>
                    <li><a href="records.html" class="nav-link">Records</a></li>
                    <li><a href="billing.html" class="nav-link">Billing</a></li>
                    <li><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="page-header">
            <div class="page-title">
                <h1>Doctor Management</h1>
                <p>Manage consulting physicians, specializations, and service departments</p>
            </div>
            <button class="btn btn-primary" onclick="openModal('doctor-modal'); document.getElementById('doctor-modal-title').textContent = 'Add New Doctor Profile'; document.getElementById('doctor-form').reset(); document.getElementById('doctor-form-id').value = '';">
                <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path>
                </svg>
                Add Doctor
            </button>
        </div>

        <!-- Doctors Grid View -->
        <div class="grid-3" id="doctors-grid">
            <div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary);">
                Loading doctors registry...
            </div>
        </div>
    </main>

    <!-- Modal Form for Registering/Updating Doctors -->
    <div class="modal-overlay" id="doctor-modal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal('doctor-modal')">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
            <h2 id="doctor-modal-title" style="margin-bottom: 1.5rem; font-weight: 700; color: #fff;">Add Doctor</h2>
            
            <form id="doctor-form">
                <input type="hidden" id="doctor-form-id">
                
                <div class="form-group">
                    <label for="doctor-name">Doctor Full Name</label>
                    <input type="text" id="doctor-name" class="form-control" placeholder="e.g. Dr. Priya Reddy" required>
                </div>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="doctor-spec">Specialization</label>
                        <input type="text" id="doctor-spec" class="form-control" placeholder="e.g. Cardiologist" required>
                    </div>
                    <div class="form-group">
                        <label for="doctor-dept">Department</label>
                        <select id="doctor-dept" class="form-control" required>
                            <option value="">Select Department</option>
                            <option value="Cardiology">Cardiology</option>
                            <option value="Neurology">Neurology</option>
                            <option value="Pediatrics">Pediatrics</option>
                            <option value="Orthopedics">Orthopedics</option>
                            <option value="Dermatology">Dermatology</option>
                            <option value="General Medicine">General Medicine</option>
                        </select>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="doctor-exp">Experience (Years)</label>
                        <input type="number" id="doctor-exp" class="form-control" placeholder="e.g. 10" required min="0">
                    </div>
                    <div class="form-group">
                        <label for="doctor-fee">Consultation Fee (₹)</label>
                        <input type="number" id="doctor-fee" class="form-control" placeholder="e.g. 800" required min="0">
                    </div>
                </div>

                <div class="form-group">
                    <label for="doctor-phone">Contact Phone</label>
                    <input type="tel" id="doctor-phone" class="form-control" placeholder="e.g. 9988776655" required>
                </div>

                <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeModal('doctor-modal')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Profile</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Hospital Care Management System. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
