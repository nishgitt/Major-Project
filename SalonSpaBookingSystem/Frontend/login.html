<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Aura Salon & Spa</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Header & Navigation -->
    <header class="navbar">
        <a href="index.html" class="nav-logo">
            <i class="fa-solid fa-gem"></i> AURA
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="stylists.html">Stylists</a></li>
            <li><a href="booking.html">Book Appointment</a></li>
        </ul>
    </header>

    <!-- Auth Form -->
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Welcome Back</h2>
                <p>Login to schedule bookings and view details</p>
            </div>
            
            <div id="loginErrorMsg" class="badge danger" style="width: 100%; display: none; margin-bottom: 1.5rem; text-align: center; padding: 0.8rem;"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="loginEmail">Email Address or Username</label>
                    <input type="text" id="loginEmail" class="form-control" placeholder="e.g. rahul@gmail.com or admin" required>
                </div>
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%;">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign Up</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Aura Salon & Spa. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
