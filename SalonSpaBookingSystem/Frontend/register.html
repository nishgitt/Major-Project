<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Aura Salon & Spa</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Header & Navigation -->
    <header class="navbar">
        <a href="index.html" class="nav-logo">
            <i class="fa-solid fa-gem"></i> AURA
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="stylists.html">Stylists</a></li>
            <li><a href="booking.html">Book Appointment</a></li>
        </ul>
    </header>

    <!-- Register Form -->
    <div class="auth-wrapper">
        <div class="auth-card" style="max-width: 540px;">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Register as a guest to begin booking online</p>
            </div>
            
            <div id="registerErrorMsg" class="badge danger" style="width: 100%; display: none; margin-bottom: 1.5rem; text-align: center; padding: 0.8rem;"></div>
            <div id="registerSuccessMsg" class="badge success" style="width: 100%; display: none; margin-bottom: 1.5rem; text-align: center; padding: 0.8rem;"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="regFullName">Full Name</label>
                    <input type="text" id="regFullName" class="form-control" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email Address</label>
                    <input type="email" id="regEmail" class="form-control" placeholder="e.g. name@example.com" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="regPhone">Phone Number</label>
                        <input type="tel" id="regPhone" class="form-control" placeholder="e.g. 9876543210" required>
                    </div>
                    <div class="form-group">
                        <label for="regGender">Gender</label>
                        <select id="regGender" class="form-control" required>
                            <option value="" disabled selected>Select gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="regPassword">Password</label>
                    <input type="password" id="regPassword" class="form-control" placeholder="Create password" required>
                </div>
                
                <button type="submit" class="btn-primary" style="width: 100%;">Create Account</button>
            </form>

            <div class="auth-footer">
                Already registered? <a href="login.html">Sign In</a>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-bottom">
            <p>&copy; 2026 Aura Salon & Spa. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
