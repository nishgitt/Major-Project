<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendee Dashboard - Eventify</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>

    <!-- Dynamic Header Navigation Bar -->
    <nav class="navbar" id="navbar-container"></nav>

    <!-- Header Title -->
    <header style="padding: 3rem 5% 1rem; text-align: left;">
        <h1 style="font-size: 2.5rem; font-family: var(--font-heading);">User Dashboard</h1>
        <p style="color: var(--text-secondary); margin-top: 0.2rem;">Track bookings, payment history, and upcoming event tickets.</p>
    </header>

    <main>
        <!-- Statistics Counter Cards -->
        <section class="dashboard-grid">
            <div class="stat-card">
                <span class="stat-title">Total Bookings</span>
                <span class="stat-value" id="dash-total-bookings">0</span>
            </div>
            <div class="stat-card secondary">
                <span class="stat-title">Upcoming Events</span>
                <span class="stat-value" id="dash-upcoming-events">0</span>
            </div>
            <div class="stat-card success">
                <span class="stat-title">Total Spent</span>
                <span class="stat-value" id="dash-total-spend">₹0</span>
            </div>
        </section>

        <!-- Booking and Payment History Table -->
        <section class="dashboard-table-container">
            <h2 style="font-family: var(--font-heading); font-size: 1.5rem; margin-bottom: 1.5rem; color: var(--color-secondary);">Booking &amp; Payment History</h2>
            
            <table class="dashboard-table">
                <thead>
                    <tr>
                        <th>Booking ID</th>
                        <th>Event Name</th>
                        <th>Event Date</th>
                        <th>Amount Paid</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="dash-history-rows">
                    <tr>
                        <td colspan="5" style="text-align: center; color: var(--text-secondary);">Loading transaction logs...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <!-- Footer -->
    <footer style="text-align: center; padding: 3rem 0; border-top: 1px solid rgba(255,255,255,0.05); color: var(--text-secondary); margin-top: 4rem;">
        <p>&copy; 2026 Eventify Inc.</p>
    </footer>

</body>
</html>
